<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Generador VIP | Solo Administrador</title>
    <style>
        body { font-family: monospace; background: #0b0f19; color: #00ff87; padding: 40px; text-align: center; }
        .box { border: 1px solid #00ff87; padding: 40px; border-radius: 15px; max-width: 600px; margin: auto; background: rgba(0, 255, 135, 0.05); }
        input { padding: 15px; width: 80%; font-size: 1.5rem; background: #000; color: #fff; border: 1px solid #00ff87; text-align: center; margin-bottom: 20px; text-transform: uppercase; border-radius: 10px; outline: none; }
        button { background: #00ff87; color: #000; padding: 15px 30px; font-weight: bold; border: none; cursor: pointer; font-size: 1.2rem; border-radius: 10px; transition: 0.3s; }
        button:hover { background: #fff; transform: scale(1.05); }
        .hash-result { margin-top: 30px; font-size: 1.8rem; color: #E3C263; word-break: break-all; padding: 20px; background: #000; border: 1px dashed #E3C263; border-radius: 10px; }
    </style>
</head>
<body>
    <div class="box">
        <h2>🔐 CREADOR DE CONTRASEÑAS ENCRIPTADAS</h2>
        <p>1. Escribe la contraseña real que le darás a tus clientes:</p>
        <input type="text" id="passText" placeholder="EJ: MUNDIAL-26">
        <button onclick="generar()">GENERAR CÓDIGO OCULTO</button>

        <p style="margin-top: 30px; color: white;">2. Copia el código amarillo y pégalo en tu <b>index.html</b>:</p>
        <div class="hash-result" id="resultado">...</div>
    </div>

    <script>
        function generar() {
            let texto = document.getElementById('passText').value.trim().toUpperCase();
            if(texto === "") return;
            let encriptado = btoa(texto).split('').reverse().join('');
            document.getElementById('resultado').innerText = encriptado;
        }
    </script>
</body>
</html>
